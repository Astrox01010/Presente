<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presente para o meu amor</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
color:white;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
text-align:center;
padding:20px;

background:
radial-gradient(circle at 20% 20%, rgba(255,255,255,0.2), transparent 40%),
radial-gradient(circle at 80% 30%, rgba(255,255,255,0.15), transparent 40%),
linear-gradient(135deg,#ff3d9a,#ff7ac3,#ffb1da);
}

body::before{
content:"🌸 🌸 🌸 🌸 🌸 🌸";
position:absolute;
font-size:80px;
opacity:0.05;
top:0;
left:0;
width:200%;
height:200%;
pointer-events:none;
}

.container{
position:relative;
z-index:2;
background:rgba(255,255,255,0.15);
padding:35px;
border-radius:25px;
backdrop-filter:blur(12px);
box-shadow:0 15px 50px rgba(0,0,0,0.3);
width:90%;
max-width:420px;
}

h1{
font-size:32px;
margin-bottom:20px;
}

.countdown{
font-size:38px;
font-weight:bold;
letter-spacing:3px;
margin:20px 0;
}

.decor{
position:absolute;
font-size:28px;
}

.l1{top:-10px; left:-10px;}
.l2{top:-10px; right:-10px;}
.l3{bottom:-10px; left:-10px;}
.l4{bottom:-10px; right:-10px;}
.l5{top:40%; left:-20px;}
.l6{top:40%; right:-20px;}

.reveal{
display:none;
animation:fade 2s ease;
}

.reveal h2{
font-size:26px;
margin-bottom:15px;
}

.reveal img{
width:200px;
max-width:85%;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

@keyframes fade{
from{opacity:0; transform:scale(0.8);}
to{opacity:1; transform:scale(1);}
}

.falling{
position:absolute;
top:-50px;
animation:fall linear infinite;
opacity:0.9;
}

@keyframes fall{
0%{transform:translateY(-50px) rotate(0deg);}
100%{transform:translateY(110vh) rotate(360deg);}
}

.sparkle{
position:absolute;
width:4px;
height:4px;
background:white;
border-radius:50%;
opacity:0.8;
animation:twinkle 3s infinite;
}

@keyframes twinkle{
0%{opacity:0.2; transform:scale(0.5);}
50%{opacity:1; transform:scale(1.5);}
100%{opacity:0.2; transform:scale(0.5);}
}

</style>
</head>

<body>

<div class="container">

<div class="decor l1">🌸</div>
<div class="decor l2">🌸</div>
<div class="decor l3">🌸</div>
<div class="decor l4">🌸</div>
<div class="decor l5">🌸</div>
<div class="decor l6">🌸</div>

<h1>Surpresa pra você, [nome dela] ❤️</h1>

<div class="countdown" id="timer"></div>

<p id="mensagem" style="margin-top:15px; font-size:16px; opacity:0.9;">
Cada segundo que passa é mais um momento perto de te ver sorrir ❤️<br>
e isso é uma das coisas mais valiosas para mim
</p>

<div class="reveal" id="reveal">
<h2>Camiseta do Fluminense<br>Fulgor Braziline Feminina</h2>
<img src="https://http2.mlstatic.com/D_NQ_NP_2X_948164-MLB72641067163_112023-F.jpg">
</div>

</div>

<script>

/* DATA BR SEGURA */
const destino = new Date(2026, 3, 6, 7, 30, 0).getTime();

function atualizarContagem(){

const agora = new Date().getTime();
const diferenca = destino - agora;

const dias = Math.floor(diferenca / (1000*60*60*24));

if(diferenca <= 0){
document.getElementById("timer").innerHTML = "É hoje!!! ❤️";

setTimeout(()=>{
document.getElementById("timer").style.display="none";
document.getElementById("reveal").style.display="block";
}, 2000);

return;
}

const horas = Math.floor((diferenca % (1000*60*60*24)) / (1000*60*60));
const minutos = Math.floor((diferenca % (1000*60*60)) / (1000*60));
const segundos = Math.floor((diferenca % (1000*60)) / 1000);

document.getElementById("timer").innerHTML =
`${dias}d ${horas}h ${minutos}m ${segundos}s`;

}

setInterval(atualizarContagem,1000);
atualizarContagem();

/* lirios + corações */

function criarItem(){
const item = document.createElement("div");
item.classList.add("falling");

const elementos = ["🌸","🤍"];
item.innerHTML = elementos[Math.floor(Math.random()*elementos.length)];

item.style.left = Math.random()*100+"vw";
item.style.animationDuration = (Math.random()*6+5)+"s";
item.style.fontSize = (Math.random()*18+18)+"px";

document.body.appendChild(item);

setTimeout(()=>{ item.remove(); },11000);
}

setInterval(criarItem,500);

/* partículas */

function criarSparkle(){
const s = document.createElement("div");
s.classList.add("sparkle");

s.style.left = Math.random()*100+"vw";
s.style.top = Math.random()*100+"vh";

document.body.appendChild(s);

setTimeout(()=>{ s.remove(); },3000);
}

setInterval(criarSparkle,300);

</script>

</body>
</html>
